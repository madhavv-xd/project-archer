# Local-dev stack — builds the backend from source and fronts it with nginx on
# plain HTTP :80 (no TLS locally). Uses the dev nginx config (no cert paths).
# Bring up with:  docker compose up --build   then  curl localhost/health

services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
