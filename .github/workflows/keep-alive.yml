name: keep-alive

# Pings the Render backend so the free instance doesn't spin down after 15 min idle.
on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (GitHub may delay during high load)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -fsS --retry 3 --retry-delay 10 "${{ secrets.RENDER_URL }}/health"
