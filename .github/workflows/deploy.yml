name: deploy-backend

# Build the backend image, push it to ECR (tagged `latest` and the commit SHA),
# then SSH into the EC2 box and roll the running container forward.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "nginx/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_SHA: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/archer-backend:$IMAGE_SHA" -t "$ECR_REGISTRY/archer-backend:latest" ./backend
          docker push "$ECR_REGISTRY/archer-backend:$IMAGE_SHA"
          docker push "$ECR_REGISTRY/archer-backend:latest"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_SHA
          script: |
            set -e
            cd ~/archer
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d
            # Wait for the new container to report healthy before declaring success.
            for i in $(seq 1 10); do
              if curl -fsS http://localhost:8000/health > /dev/null; then
                echo "health check passed"
                break
              fi
              if [ "$i" = "10" ]; then
                echo "health check failed after new deploy" >&2
                exit 1
              fi
              sleep 3
            done
            docker system prune -f
        env:
          IMAGE_SHA: ${{ github.sha }}
