# Local-dev nginx: plain HTTP, no TLS. Proxies everything to the backend
# container. Used only by docker-compose.yml (the prod config lives in
# nginx.conf and requires Let's Encrypt certs that don't exist locally).

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
