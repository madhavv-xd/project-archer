# Production nginx for api.project-archer.online (runs in the nginx container on
# the EC2 box). Terminates TLS and reverse-proxies to the backend container.
#
# NOTE: the :443 server block references Let's Encrypt certs that only exist
# AFTER certbot has issued them (tasks 4.2). On a brand-new box, bring nginx up
# only once the certs are in place; the initial cert is issued with certbot
# --standalone while nginx is stopped (port 80 free).

# HTTP :80 — serve the ACME challenge for cert renewals, redirect all else to HTTPS.
server {
    listen 80;
    server_name api.project-archer.online;

    # Let's Encrypt webroot renewals reach files here (mounted from /var/www/certbot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — the real API.
server {
    listen 443 ssl;
    http2 on;
    server_name api.project-archer.online;

    ssl_certificate     /etc/letsencrypt/live/api.project-archer.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.project-archer.online/privkey.pem;

    # Sensible modern TLS defaults.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # LLM API — streaming (SSE) must reach the client incrementally, so disable
    # response buffering here. proxy_read_timeout covers slow upstream calls.
    location /v1/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # LLM upstream calls can be slow — don't cut them off at nginx's default 60s.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
